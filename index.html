<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f" id="meta-theme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>RiKi Trading</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --blue:#0077b6; --blue-dim:rgba(0,119,182,0.55);
  --orange:#e07a2f; --green:#00b894; --gold:#f4c542; --red:#e55353;
  --bg:#0a0a0f; --bg2:#111118; --bg3:#18181f; --bg4:#1e1e28;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.04);
  --text:#f0f0f5; --text2:rgba(240,240,245,0.55); --text3:rgba(240,240,245,0.3);
  color-scheme: dark;
}
[data-theme="light"]{
  --bg:#f2f2f7;--bg2:#fff;--bg3:#f8f8fc;--bg4:#eeeef4;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.04);
  --text:#0a0a0f;--text2:rgba(10,10,15,0.55);--text3:rgba(10,10,15,0.3);
  color-scheme: light;
}
[data-theme="light"] body,[data-theme="light"] #app,[data-theme="light"] .pane,[data-theme="light"] #ph{background:var(--bg);}
[data-theme="light"] #tabs-wrap,[data-theme="light"] #tabs{background:var(--bg2);}
[data-theme="light"] .tab svg{color:rgba(10,10,15,0.6);}
[data-theme="light"] .tlabel{color:rgba(10,10,15,0.6);}
[data-theme="light"] .tab.on svg{color:#00b894;}
[data-theme="light"] .tbtn{color:rgba(10,10,15,0.5);}
[data-theme="light"] .tbtn.on{color:var(--text);}
[data-theme="light"] .mhdr{color:rgba(10,10,15,0.4);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg); height: 100%;}
body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;}
#app{width:100%;height:100%;display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  padding-top:env(safe-area-inset-top,0px);}
#header{-webkit-flex-shrink:0;flex-shrink:0;height:80px;
  display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;
  -webkit-justify-content:space-between;justify-content:space-between;
  padding:0 16px;background:var(--bg); border-bottom: none;}
#hright{display:-webkit-flex;display:flex;-webkit-flex-direction:row;flex-direction:row;-webkit-align-items:center;align-items:center;gap:8px;}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green);}
.sdot.exp{background:var(--gold);}.sdot.dead{background:var(--red);}
#utime{font-size:10px;color:var(--text2);}
#rbtn{width:26px;height:26px;border-radius:50%;border:none;
  background:transparent;display:-webkit-flex;display:flex;-webkit-align-items:center;
  align-items:center;-webkit-justify-content:center;justify-content:center;
  cursor:pointer;-webkit-flex-shrink:0;flex-shrink:0;touch-action:manipulation;}
#rbtn:active{opacity:0.6;}
#rbtn.spin svg{-webkit-animation:spin 0.7s linear infinite;animation:spin 0.7s linear infinite;}
@-webkit-keyframes spin{to{-webkit-transform:rotate(360deg);transform:rotate(360deg);}}
@keyframes spin{to{transform:rotate(360deg);}}
#rbtn svg{width:11px;height:11px;color:var(--text2);}
#wm{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;}
#wm svg.logo{width:82px;height:82px;display:block;}
@-webkit-keyframes logo-flash{0%,100%{opacity:1;filter:none;}40%{opacity:0.35;filter:drop-shadow(0 0 10px #00d4a6);}70%{opacity:1;filter:drop-shadow(0 0 14px #00d4a6);}}
@keyframes logo-flash{0%,100%{opacity:1;filter:none;}40%{opacity:0.35;filter:drop-shadow(0 0 10px #00d4a6);}70%{opacity:1;filter:drop-shadow(0 0 14px #00d4a6);}}
#wm.flash svg{-webkit-animation:logo-flash 0.55s ease-out;animation:logo-flash 0.55s ease-out;}
#content{-webkit-flex:1;flex:1;position:relative;overflow:hidden;background:var(--bg);}
.pane{display:none;position:absolute;top:0;left:0;right:0;bottom:0;
  overflow-x:auto;overflow-y:scroll;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;background:var(--bg);}
.scroll-spacer{height:calc(60px + env(safe-area-inset-bottom,0px));}
.pane.on{display:block;}
#ph{display:none;position:absolute;top:0;left:0;right:0;bottom:0;
  -webkit-flex-direction:column;flex-direction:column;overflow:hidden;padding-bottom:0;background:var(--bg);}
#ph.on{display:-webkit-flex;display:flex;}
#ph-top{-webkit-flex-shrink:0;flex-shrink:0;padding:14px 16px 0;background:var(--bg);}
#ph-scroll{-webkit-flex:1;flex:1;overflow-x:auto;overflow-y:scroll;
  -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;}
#tabs-wrap{position:fixed;bottom:0;left:0;right:0;z-index:999;
  background:var(--bg); border-top: none;
  padding-bottom:env(safe-area-inset-bottom,0px);}
@media all and (display-mode:standalone){#tabs-wrap{padding-bottom:0px;}}
html.pwa #tabs-wrap{padding-bottom:0px;}
#tabs{height:60px;background:var(--bg);display:-webkit-flex;display:flex;}
#tabs-safe{display:none;}
.tab{-webkit-flex:1;flex:1;display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;
  -webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  gap:4px;cursor:pointer;position:relative;touch-action:manipulation;padding-bottom:0;}
.tab::after{content:'';position:absolute;top:auto;bottom:0;left:10%;right:10%;
  height:3px;border-radius:2px;background:#00b894;-webkit-transform:scaleX(0);transform:scaleX(0);
  -webkit-transition:-webkit-transform 0.2s;transition:transform 0.2s;}
.tab.on::after{-webkit-transform:scaleX(1);transform:scaleX(1);}
.tab svg{width:28px;height:28px;color:rgba(240,240,245,0.7);stroke:currentColor;fill:none;
  stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.tab.on svg{color:#00b894;}
.tlabel{font-size:10px;font-weight:700;color:rgba(240,240,245,0.7);text-transform:uppercase;}
.tab.on .tlabel{color:#00b894;}
.tbar{display:-webkit-flex;display:flex;background:var(--bg3);border-radius:10px;padding:4px;gap:3px;}
.tbtn{-webkit-flex:1;flex:1;padding:5px 0;text-align:center;font-size:16px;font-weight:700;
  border-radius:8px;color:var(--text3);cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.tbtn.on{background:var(--bg2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.pos{color:var(--green);}.neg{color:var(--red);}.dim{color:var(--text2);}
.mono{font-variant-numeric:tabular-nums;}
.pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:13px;font-weight:700;text-transform:uppercase;}
.pb{background:rgba(0,119,182,.15);color:var(--blue);}
.pg{background:rgba(0,184,148,.15);color:var(--green);}
.py{background:rgba(244,197,66,.15);color:var(--gold);}
.pr{background:rgba(229,83,83,.15);color:var(--red);}
.po{background:rgba(224,122,47,.15);color:var(--orange);}
.warn{margin:14px 16px 0;padding:13px 14px;border-radius:10px;
  font-size:12px;font-weight:500;display:-webkit-flex;display:flex;gap:9px;align-items:flex-start;
  background:rgba(244,197,66,.08);border:1px solid rgba(244,197,66,.2);color:var(--gold);}
.warn.urg{background:rgba(229,83,83,.08);border-color:rgba(229,83,83,.2);color:var(--red);}
#pd{padding-bottom:32px;}
.wcard{margin:14px 16px 0;background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;padding:22px 18px;display:-webkit-flex;display:flex;
  -webkit-flex-direction:column;flex-direction:column;gap:20px;}
.whdr{display:-webkit-flex;display:flex;-webkit-align-items:baseline;align-items:baseline;
  -webkit-justify-content:space-between;justify-content:space-between;}
.wlabel{font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:-0.01em;color:rgba(240,240,245,0.65);}
.wexp{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums;}
.asect{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:10px;}
.alabel{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.02em;}
.anums{display:-webkit-flex;display:flex;width:100%;}
.aitem{-webkit-flex:1;flex:1;}
.anum-lbl{font-size:11px;color:var(--text3);font-weight:500;margin-bottom:4px;}
.anum-val{font-size:13px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;}
.prow{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;margin-top:4px;}
.pbg{-webkit-flex:1;flex:1;height:7px;border-radius:4px;background:var(--border);overflow:hidden;}
.pfill{height:100%;border-radius:3px;background:var(--blue);width:0%;-webkit-transition:width .6s ease;transition:width .6s ease;}
.ppct{font-size:12px;font-weight:800;color:var(--blue);min-width:64px;text-align:right;font-variant-numeric:tabular-nums;}
.ptgt{font-size:11px;color:var(--text3);margin-top:3px;}
.wtot{border-top:1px solid var(--border);padding-top:16px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;}
.wtot-lbl{font-size:9px;color:var(--text3);font-weight:600;margin-bottom:4px;}
.wtot-val{font-size:13px;font-weight:800;letter-spacing:-0.04em;font-variant-numeric:tabular-nums;}
.cap{margin:14px 16px 0;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px 18px;}
.cap-title{font-size:17px;font-weight:700;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;text-align:center;margin-bottom:18px;}
.cap-rows{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:0;position:relative;}
.cap-row{display:-webkit-flex;display:flex;-webkit-align-items:stretch;align-items:stretch;}
.cap-acct{font-size:17px;font-weight:700;color:var(--text2);width:56px;-webkit-flex-shrink:0;flex-shrink:0;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;}
.cap-side{-webkit-flex:1;flex:1;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:10px 0;}
.cap-div{width:1px;background:var(--border);margin:0 20px;-webkit-flex-shrink:0;flex-shrink:0;-webkit-align-self:stretch;align-self:stretch;}
.cap-n{font-size:21px;font-weight:800;letter-spacing:-0.03em;font-variant-numeric:tabular-nums;line-height:1;}
.cap-n.c{color:var(--blue);}.cap-n.p{color:var(--orange);}
.cap-s{font-size:18px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-top:3px;}
.cap-s.c{color:rgba(0,119,182,.45);}.cap-s.p{color:rgba(224,122,47,.45);}
table{width:100%;border-collapse:collapse;}
th{padding:6px 8px;font-size:11px;font-weight:700;color:var(--text2);letter-spacing:0.03em;text-transform:uppercase;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg3);}
th:first-child{padding-left:18px;}th:last-child{padding-right:18px;}
td{padding:7px 8px;font-size:13px;font-weight:500;color:var(--text);text-align:center;border-bottom:1px solid var(--border2);font-variant-numeric:tabular-nums;white-space:nowrap;}
td:first-child{padding-left:18px;}td:last-child{padding-right:18px;}
tbody tr:last-child td{border-bottom:none;}
.atag{display:inline-block;font-size:13px;font-weight:700;padding:2px 6px;border-radius:4px;}
.pa1{background:rgba(0,184,148,.15);color:#00b894;}
.pa2{background:rgba(244,197,66,.15);color:#f4c542;}
.mhdr{padding:14px 12px 6px;font-size:14px;font-weight:700;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;}
#hc td:first-child{color:var(--text2);}
#ps{padding-bottom:32px;}
.scard{margin:14px 16px 0;background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.srow{display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:space-between;justify-content:space-between;padding:18px;border-bottom:1px solid var(--border2);}
.srow:last-child{border-bottom:none;}
.slbl{font-size:13px;font-weight:600;}
.ssub{font-size:10px;color:var(--text2);margin-top:2px;}
.abtn{padding:7px 16px;background:rgba(0,119,182,.15);color:var(--blue);border-radius:20px;border:none;font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;font-family:inherit;touch-action:manipulation;-webkit-flex-shrink:0;flex-shrink:0;display:inline-flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;line-height:1;-webkit-appearance:none;appearance:none;}
.abtn.red{background:rgba(229,83,83,.15);color:var(--red);}
.tog{position:relative;width:51px;height:31px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.tog-track{width:100%;height:100%;border-radius:31px;background:var(--bg4);border:1px solid var(--border);-webkit-transition:background .2s,border-color .2s;transition:background .2s,border-color .2s;}
.tog.on .tog-track{background:var(--blue);border-color:var(--blue);}
.tog-thumb{position:absolute;top:2px;left:2px;width:27px;height:27px;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.3);-webkit-transition:-webkit-transform .2s cubic-bezier(.4,0,.2,1);transition:transform .2s cubic-bezier(.4,0,.2,1);}
.tog.on .tog-thumb{-webkit-transform:translateX(20px);transform:translateX(20px);}
.sver{text-align:center;font-size:10px;color:var(--text3);padding:18px;}
.hwm-card{margin:14px 16px 0;background:rgba(229,83,83,.06);border:1px solid rgba(229,83,83,.2);border-radius:16px;overflow:hidden;}
.hwm-hdr{padding:14px 18px 10px;display:-webkit-flex;display:flex;align-items:center;gap:9px;}
.hwm-title{font-size:13px;font-weight:700;color:var(--red);}
.hwm-row{padding:10px 18px;border-top:1px solid rgba(229,83,83,.12);display:-webkit-flex;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.hwm-info{flex:1;}
.hwm-key{font-size:12px;font-weight:700;color:var(--text);}
.hwm-detail{font-size:11px;color:var(--text2);margin-top:2px;}
#toast{position:fixed;bottom:130px;left:50%;-webkit-transform:translateX(-50%) translateY(16px);transform:translateX(-50%) translateY(16px);background:var(--bg4);border:1px solid var(--border);border-radius:24px;padding:11px 22px;font-size:22px;font-weight:600;color:var(--text);opacity:0;-webkit-transition:opacity .2s,-webkit-transform .2s;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.on{opacity:1;-webkit-transform:translateX(-50%) translateY(0);transform:translateX(-50%) translateY(0);}
body.overlaying #tabs-wrap{display:none !important;}
#loverlay{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;height:100%;z-index:9999;background:rgba(10,10,15,0.80);
  display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;
  -webkit-justify-content:center;justify-content:center;
  opacity:0;pointer-events:none;-webkit-transform:translateZ(0);transform:translateZ(0);-webkit-transition:none;transition:none;}
#loverlay.on{opacity:1;pointer-events:all;}
#loverlay.out{opacity:0;pointer-events:none;}
@-webkit-keyframes arc-inner{0%,100%{opacity:0.15;filter:none;}40%{opacity:1;filter:drop-shadow(0 0 6px #00b894);}60%{opacity:1;filter:drop-shadow(0 0 6px #00b894);}}
@keyframes arc-inner{0%,100%{opacity:0.15;filter:none;}40%{opacity:1;filter:drop-shadow(0 0 6px #00b894);}60%{opacity:1;filter:drop-shadow(0 0 6px #00b894);}}
@-webkit-keyframes arc-outer{0%,100%{opacity:0.15;filter:none;}60%{opacity:1;filter:drop-shadow(0 0 10px #00b894);}80%{opacity:1;filter:drop-shadow(0 0 10px #00b894);}}
@keyframes arc-outer{0%,100%{opacity:0.15;filter:none;}60%{opacity:1;filter:drop-shadow(0 0 10px #00b894);}80%{opacity:1;filter:drop-shadow(0 0 10px #00b894);}}
@-webkit-keyframes ring-pulse{0%,100%{opacity:0.2;}50%{opacity:0.5;}}
@keyframes ring-pulse{0%,100%{opacity:0.2;}50%{opacity:0.5;}}
#loverlay svg .arc-i{-webkit-animation:arc-inner 1.6s ease-in-out infinite;animation:arc-inner 1.6s ease-in-out infinite;}
#loverlay svg .arc-o{-webkit-animation:arc-outer 1.6s ease-in-out infinite;animation:arc-outer 1.6s ease-in-out infinite;}
#loverlay svg .ring{-webkit-animation:ring-pulse 1.6s ease-in-out infinite;animation:ring-pulse 1.6s ease-in-out infinite;}
.empty{padding:48px 16px;text-align:center;color:var(--text3);font-size:23px;}
::-webkit-scrollbar{width:0;height:0;}
@-webkit-keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>

<script>

  var wm = ge('wm');

  setTimeout(function(){ wm.classList.remove('flash'); }, 600);

function doRefresh(){
  haptic();
  // Show dim overlay immediately — arcs animate while Schwab refresh runs
  showOverlay();
  // Fetch data.json in parallel (~200ms) — updates data visible through the dim overlay
  fetch(DATA_JSON + '?_=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(snap){ renderAll(snap); saveCache(snap); })
    .catch(function(){}); // silent — overlay still up, Schwab fetch continues
  // Full Schwab refresh — overlay stays until THIS completes
  fetch(BACKEND + '?action=refresh')
    .then(function(r){ return r.json(); })
    .then(function(fresh){
      hideOverlay();
      renderAll(fresh);
      saveCache(fresh);
      flashLogo();
    })
    .catch(function(e){ hideOverlay(); toast('Error: '+errMsg(e)); });
}

  var dc=ge('dc');dc.innerHTML='';
  var rows=d.archRows||[];
  var gv=Object.values(d.goals||{});
  var g1=parseFloat(gv[0])||4000,g2=parseFloat(gv[1])||3000;
  var KEYS=['THIS WEEK','NEXT WEEK','WEEK AFTER'],LBLS=['This Week','Next Week','Week After'];
  function parsePCstr(s){

var posSort={col:'exp',dir:1};
function posSortBy(col){ if(posSort.col===col){posSort.dir*=-1;}else{posSort.col=col;posSort.dir=col==='net'?-1:1;} renderPositions(DATA||MOCK); }
function renderPositions(d){
  var rows=d.invRows||[];
  var arw=function(col){var a=posSort.col===col?(posSort.dir===1?'\u2191':'\u2193'):'\u2195';var color=posSort.col===col?'color:var(--blue);':'color:var(--text3);';return '<span style="'+color+'font-size:11px;margin-left:3px;">'+a+'</span>';};
  ge('pth').innerHTML='<tr><th>Acct</th><th onclick="posSortBy(\'type\')" style="cursor:pointer">Type'+arw('type')+'</th><th>Strike</th><th onclick="posSortBy(\'exp\')" style="cursor:pointer">Expiry'+arw('exp')+'</th><th>Qty</th><th onclick="posSortBy(\'net\')" style="cursor:pointer">Net'+arw('net')+'</th></tr>';
  var tb=ge('ptb');tb.innerHTML='';
  if(!rows.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text3)">No open positions</td></tr>';return;}

    var isPutA=String(a[2]||'').toUpperCase().indexOf('PUT')>=0;
    var isPutB=String(b[2]||'').toUpperCase().indexOf('PUT')>=0;

function renderHist(){
  var d=DATA||MOCK;var el=ge('hc');el.innerHTML='';

    else{rows.slice().reverse().forEach(function(row){var lbl=String(row[0]||'\u2014').replace(/\s*\(.*\)/,'').trim();var a1=money(row[1]),a2=money(row[3]),tot=money(row[6]);var tr=document.createElement('tr');tr.innerHTML='<td style="text-align:left">'+lbl+'</td><td class="'+cc(a1)+'">'+fmt(a1)+'</td><td class="'+cc(a2)+'">'+fmt(a2)+'</td><td class="'+cc(tot)+'">'+fmtS(tot)+'</td>';tb.appendChild(tr);});}

  } else {
    var monthly={};
    function normMon(k){var us=k.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(us)return us[3]+'-'+us[1].padStart(2,'0')+'-'+us[2].padStart(2,'0');var usShort=k.match(/^(\d{1,2})\/(\d{4})$/);if(usShort)return usShort[2]+'-'+usShort[1].padStart(2,'0');return k;}
    var mBase=d.monthly||{};
    Object.keys(mBase).forEach(function(k){var nk=normMon(k).substring(0,7);if(!monthly[nk])monthly[nk]={a1:0,a2:0,total:0};monthly[nk].a1+=mBase[k].a1||0;monthly[nk].a2+=mBase[k].a2||0;monthly[nk].total+=mBase[k].total||0;});
    var archRows=d.archRows||[];
    var activeMonths=new Set();
    archRows.forEach(function(row){var raw=String(row[0]||'');var dm=raw.match(/(\d{4}-\d{2})/);if(!dm)return;var mo=dm[1];var a1b=money(row[1]||0),a2b=money(row[3]||0);if(!monthly[mo])monthly[mo]={a1:0,a2:0,total:0};monthly[mo].a1+=a1b;monthly[mo].a2+=a2b;monthly[mo].total+=a1b+a2b;activeMonths.add(mo);});
    var months=Object.keys(monthly).sort(function(a,b){return b.localeCompare(a);});
    if(!months.length){el.innerHTML='<div class="empty">No monthly data</div>';return;}
    var t=document.createElement('table');
    t.innerHTML='<thead><tr><th style="text-align:left">Month</th><th>A1 Banked</th><th>A2 Banked</th><th>Total</th></tr></thead>';
    var tb=document.createElement('tbody');
    var now=new Date(),cm=now.getFullYear()+'-'+(now.getMonth()<9?'0':'')+(now.getMonth()+1);
    months.forEach(function(mo){
      var e=monthly[mo];var hdrtxt;
      try{hdrtxt=new Date(mo+'-02').toLocaleDateString('en-US',{month:'long',year:'numeric'});}catch(x){hdrtxt=mo;}
      var a1=e.a1||0,a2=e.a2||0,tot=e.total||0,isCur=(mo===cm)||activeMonths.has(mo);
      var dot=isCur?'&nbsp;<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#00b894;vertical-align:middle;position:relative;top:-1px;-webkit-animation:blink 1.4s ease-in-out infinite;animation:blink 1.4s ease-in-out infinite"></span>':'';
      var tr=document.createElement('tr');
      tr.innerHTML='<td style="text-align:left;font-weight:600">'+hdrtxt+dot+'</td><td class="'+cc(a1)+'">'+fmtS(a1)+'</td><td class="'+cc(a2)+'">'+fmtS(a2)+'</td><td class="'+cc(tot)+'">'+fmtS(tot)+'</td>';
      tb.appendChild(tr);
    });
    t.appendChild(tb);el.appendChild(t);
  }
}
function renderSettings(d){
  var pill=ge('tpill'),state=d.tokenState||'unknown';
  var expMs=d.tokenExpiry||0;
  var daysLeft=expMs?Math.max(0,Math.ceil((expMs-Date.now())/86400000)):null;
  var daysStr=daysLeft!==null?(daysLeft+' day'+(daysLeft===1?'':'s')+' left'):'';
  var map={fresh:{lbl:'Active',cls:'pg'},expiring:{lbl:'Expiring',cls:'py'},expired:{lbl:'Expired',cls:'pr'}};
  var info=map[state]||{lbl:state,cls:'pb'};
  if(pill){pill.className='pill '+info.cls;pill.textContent=info.lbl;}
  var td=ge('tdays');if(td)td.textContent=daysStr;

  // ── Nickel Closer (Auto-close) toggle section ──────────────────────────────
  var nc = ge('nc-section');
  nc.innerHTML = '';
  var archRows = d.archRows || [];
  var ncDisabled = d.nickelCloserDisabled || [];
  // Extract wk1 and wk2 expiry dates from archRows
  var weeks = [];
  ['THIS WEEK','NEXT WEEK'].forEach(function(label, i){
    for(var r=0; r<archRows.length; r++){
      var raw = String(archRows[r][0] || '');
      if(raw.toUpperCase().indexOf(label) >= 0){
        var m = raw.match(/(\d{4}-\d{2}-\d{2})/);
        if(m) weeks.push({ expiry: m[1], label: i===0 ? 'This Week' : 'Next Week' });
        break;
      }
    }
  });
  if(weeks.length > 0){
    var ncCard = document.createElement('div');
    ncCard.className = 'scard';
    weeks.forEach(function(wk, idx){
      var isEnabled = ncDisabled.indexOf(wk.expiry) < 0;
      var row = document.createElement('div');
      row.className = 'srow';
      row.innerHTML =
        '<div>' +
          '<div class="slbl">Auto-close &middot; ' + wk.label + '</div>' +
          '<div class="ssub">' + wk.expiry + '</div>' +
        '</div>' +
        '<div class="tog' + (isEnabled ? ' on' : '') + '" ' +
          'onclick="toggleNickelCloser(\'' + wk.expiry + '\')" ' +
          'style="' + (isEnabled ? '' : 'opacity:0.6;') + '">' +
          '<div class="tog-track" style="' + (!isEnabled ? 'background:var(--bg4);border-color:var(--border);' : '') + '"></div>' +
          '<div class="tog-thumb"></div>' +
        '</div>';
      ncCard.appendChild(row);
    });
    nc.appendChild(ncCard);
  }

  // ── HWM warning section ────────────────────────────────────────────────────
  var sec=ge('hwm-section');
  sec.innerHTML='';
  var warns=d.hwmWarnings||{};
  var keys=Object.keys(warns);
  if(!keys.length) return;
  var card=document.createElement('div');
  card.className='hwm-card';
  var hdr=document.createElement('div');
  hdr.className='hwm-hdr';
  hdr.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#e55353" stroke-width="2.5" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'+
    '<span class="hwm-title">Banked Gain Anomaly Detected</span>';
  card.appendChild(hdr);
  keys.forEach(function(k){
    var w=warns[k];
    var parts=k.split(':');
    var acct=parts[0]||k, expiry=parts[1]||'';
    var row=document.createElement('div');
    row.className='hwm-row';
    row.innerHTML='<div class="hwm-info">'+
      '<div class="hwm-key">'+acct+' &middot; '+expiry+'</div>'+
      '<div class="hwm-detail">Hedge explains <span style="color:var(--green)">$'+(w.hedge||0).toFixed(0)+'</span> of drop &mdash; <span style="color:var(--red)">$'+(w.excess||0).toFixed(0)+'</span> unexplained</div>'+
      '<div class="hwm-detail" style="margin-top:3px;color:var(--text3)">Fix Archive row, then Clear HWM to dismiss</div>'+
    '</div>'+
    '<button class="abtn red" onclick="doClearHWM(this)">Clear HWM</button>';
    card.appendChild(row);
  });
  sec.appendChild(card);
}

if(oauthCode){
  window.history.replaceState({}, document.title, window.location.pathname);
  switchTab('s');
  toast('Completing authentication\u2026', 5000);
  fetch(BACKEND+'?action=exchangeCode&code='+encodeURIComponent(oauthCode))
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.success){
        toast('\u2713 Connected to Schwab!');

} else {
  // Render cached data immediately — never show blank if we have prior data
  var _cached = null;
  try{ var _cs=localStorage.getItem('riki_data');if(_cs)_cached=JSON.parse(_cs); }catch(e){}
  if(_cached){ renderAll(_cached); }
  // Silent background fetch from GitHub CDN (~200ms vs ~1-2s GAS cold start)
  fetch(DATA_JSON + '?_=' + Date.now())
    .then(function(r){return r.json();})
    .then(function(d){
      var changed = _cached && d.updated !== _cached.updated;
      renderAll(d);
      _lastFetch=Date.now();
      saveCache(d);
      if(changed) flashLogo();
    })
    .catch(function(e){console.error(e);});
}
var _lastFetch = Date.now();

// Poll data.json every 5 minutes while app is open and visible
setInterval(function(){
  if(document.visibilityState !== 'visible') return;
  fetch(DATA_JSON + '?_=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(d){
      var changed = DATA && d.updated !== DATA.updated;
      if(!changed) return; // nothing new — skip render
